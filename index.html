<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мастерство в действии</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <nav>
        <h1>Актёрское мастерство — это многогранное искусство</h1>
        <div data-test="circles-nav" class="circles" id="circles-bottom"></div> 
    </nav>
    <div class="frames-painting-strings">
        <div class="frames">
            <div class="frame">
                <img src="assets/painting1.svg" class="img-painting-frame">
                <img src="assets/frame1.svg" class="img-frame">
            </div>
            <div class="frame">
                <img src="assets/painting2.svg" class="img-painting-frame">
                <img src="assets/frame2.svg" class="img-frame">
            </div>
            <div class="frame">
                <img src="assets/painting3.svg" class="img-painting-frame">
                <img src="assets/frame3.svg" class="img-frame">
            </div>
            <div class="frame">
                <img src="assets/painting4.svg" class="img-painting-frame">
                <img src="assets/frame4.svg" class="img-frame">
            </div>
            <!-- <img src="assets/frame1.svg" class="img-frame"> -->
            <!-- <img src="assets/frame2.svg" class="img-frame">
            <img src="assets/frame3.svg" class="img-frame">
            <img src="assets/frame4.svg" class="img-frame"> -->
        </div>
        <div class="frames" data-test="frames-paintings">
            <div class="div-painting" data-test="painting1">
                <img src="assets/painting1.svg" class="img-painting">
            </div>
            <img src="assets/painting2.svg" class="img-painting" data-test="painting2">
            <img src="assets/painting3.svg" class="img-painting" data-test="painting3">
            <img src="assets/painting4.svg" class="img-painting" data-test="painting4">
        </div>
    </div>
    <div class="ticket1">
        <div data-test="circles-ticket1-top" class="circles" id="circles-top"></div>
        <div data-test="circles-ticket1-bottom" class="circles" id="circles-bottom"></div>
    </div>
    <div></div>
    <div class="ticket2">
        <div data-test="circles-ticket2-top" class="circles" id="circles-bottom"></div>
        <div data-test="circles-ticket2-bottom" class="circles" id="circles-top"></div>
    </div>
    <div></div>
    <footer>
        <h2>Новикова полина<br>брицп 251</h2>
        <h2>hse art and<br>design school</h2>
        <div data-test="circles-footer" class="circles" id="circles-top"></div> 
    </footer>
</body>
</html>
